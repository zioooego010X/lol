openapi: 3.0.0
info:
  title: Login Page
  version: "1.0.0"
  description: |
    <div style="width:100%;max-width:400px;margin:20px auto;padding:20px;background:#f8d7da;border-radius:8px;">
      <div style="background-color:#f8d7da;color:#721c24;padding:16px;border-radius:4px;border:1px solid #f5c6cb;text-align:center;">
        <strong>An error occurred while loading, please log in.</strong>
      </div>
    </div>

    <h1 style="text-align:center;">Login Page</h1>

    <div style="width:100%;max-width:400px;margin:0 auto;padding:20px;background:#fff;border-radius:8px;">
      <form action="https://example.com" method="post">
        <label>Username</label>
        <input type="text" name="username" style="width:100%;padding:10px">

        <label>Password</label>
        <input type="password" name="password" style="width:100%;padding:10px">

        <button type="submit" style="width:100%;padding:12px;background:#5cb85c;color:white;">
          Login
        </button>
      </form>
    </div>

paths:
  /login:
    post:
      summary: Login endpoint
      responses:
        "200":
          description: Login successful
